<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
.box1{
   width: 200px;
   height: 100px;
   background-color: olive;
}
.box2{
  width: 50%;
  height: 50px;
  background-color: orange;
}
body{
  font-size: 30px;
}
.text1{
  font-size: 2em;
}
.text2{
  font-size: 2rem;
}
.full{
  width: 300px;
  height: 300px;
  background:#ff00ff;
}
</style>
</head>
<!-- 
   px : 버튼 / 아이콘 크기 
        테두리            - 글자 크기(비추천)
        위치 조정 
   % : 레이아웃   - 글자 크기 (예측이 안된다) => 비추천  
   em : 글자 관련 크기 
   
   margin / padding / width / height => px 
   레이아웃 : %
       ----------------------
       
       ----------------------
            |
            | 
            |
       ----------------------
       
       ----------------------
 -->
<body>
  <div class="box1">px 단위</div>
  <div class="box2">% 단위(반응형 웹)</div>
  <div class="text1">em 단위(글자 크기)</div>
  <div class="text2">rem 단위(글자 크기)</div>
  <div class="full">풀단위</div>
</body>
</html>
